<svg width="300" heigth="100" xmlns="http://www.w3.org/2000/svg">
    <circle r="40" cx="50" cy="50"
        fill="yellow" stroke="black"
        stroke-width="3">
        <animate
            attributeName="cx"
            begin="0s"
            dur=".001s"
            from="0"
            to="100%"
            repeatCount="indefinite" />
