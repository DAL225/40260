    <title>Grafico SVG</title>
</head>
<body>
    <h1>Gráfico SVG</h1>
        <svg width="100" heigth="100" viewbox="0 0 50 50">
            <circle r="40" cx="50" cy="50" fill="red" stroke="black" stroke-width="3">
                
            </circle>
            <animateTransform
                    attributeName="transform"
                    begin= "0s"
                    dur="0.1s"
                    type="rotate"
                    from="0 85 85"
                    to="366 85 85"
                    repeatCount="indefinite" />        
        </svg>
